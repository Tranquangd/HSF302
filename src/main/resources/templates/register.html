<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Hotel Booking System</title>
    <link rel="stylesheet" th:href="@{/css/hotel-booking.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #C9A96E;
            --gold-light: #E8CFAB;
            --gold-dim: rgba(201,169,110,0.12);
            --dark: #0D0D0D;
            --dark-2: #141414;
            --dark-3: #1C1C1C;
            --dark-4: #252525;
            --text: #E8E2D9;
            --text-muted: #8A8278;
            --text-dim: #5C5650;
            --border: rgba(201,169,110,0.18);
            --border-subtle: rgba(255,255,255,0.06);
            --radius: 4px;
            --radius-md: 8px;
            --shadow: 0 24px 64px rgba(0,0,0,0.7);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(201,169,110,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── HEADER ─── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13,13,13,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            margin: 0 -32px;
            padding: 0 32px;
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
            gap: 24px;
        }
        .header-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--gold);
            text-decoration: none;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-auth {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-auth span { font-size: 0.8rem; color: var(--text-muted); }
        .btn-white {
            font-size: 0.78rem;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: var(--radius);
            text-decoration: none;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            background: var(--gold);
            color: var(--dark);
            border: 1px solid var(--gold);
            transition: background 0.2s;
        }
        .btn-white:hover { background: var(--gold-light); }

        /* ─── MAIN ─── */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
        }

        /* ─── CARD ─── */
        .register-wrap {
            width: 100%;
            max-width: 440px;
            animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .register-card {
            background: var(--dark-2);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .register-card::before {
            content: '';
            display: block;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .register-card-inner { padding: 44px 44px 40px; }

        .register-eyebrow {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
            opacity: 0.85;
        }
        .register-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 300;
            color: var(--text);
            line-height: 1.1;
            margin-bottom: 6px;
        }
        .register-title em { font-style: italic; color: var(--gold); }
        .register-subtitle {
            font-size: 0.83rem;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 36px;
        }

        /* ─── ALERTS ─── */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 0.82rem;
            margin-bottom: 24px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.5;
        }
        .alert-success { background: rgba(60,180,100,0.08); border: 1px solid rgba(60,180,100,0.22); color: #68d48a; }
        .alert-error   { background: rgba(220,70,70,0.08);  border: 1px solid rgba(220,70,70,0.22);  color: #e07878; }

        /* ─── FORM ─── */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 0.73rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
            transition: color 0.2s;
        }
        .form-group input {
            width: 100%;
            background: var(--dark-3);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 13px 14px 13px 42px;
            font-size: 0.88rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input::placeholder { color: var(--text-dim); }
        .form-group input:focus {
            border-color: var(--border);
            box-shadow: 0 0 0 3px rgba(201,169,110,0.08);
        }

        .error {
            display: block;
            font-size: 0.75rem;
            color: #e07878;
            margin-top: 6px;
            padding-left: 2px;
        }

        .btn-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-dim);
            padding: 4px;
            display: flex;
            transition: color 0.2s;
        }
        .btn-eye:hover { color: var(--text-muted); }

        /* ─── SUBMIT ─── */
        .form-actions { margin-top: 28px; }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: var(--radius);
            font-size: 0.78rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        .btn-submit:hover {
            background: var(--gold-light);
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(201,169,110,0.3);
        }
        .btn-submit:active { transform: translateY(0); }

        /* ─── FOOTER LINK ─── */
        .register-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.82rem;
            color: var(--text-dim);
        }
        .register-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .register-footer a:hover { color: var(--gold-light); }

        .divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 28px 0;
        }

        /* ─── PAGE FOOTER ─── */
        footer {
            border-top: 1px solid var(--border-subtle);
            padding: 24px 0;
            text-align: center;
        }
        footer p { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.06em; }

        @media (max-width: 540px) {
            .container { padding: 0 16px; }
            header { margin: 0 -16px; padding: 0 16px; }
            .register-card-inner { padding: 32px 24px 28px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ===== HEADER ===== -->
    <header>
        <div class="header-inner">
            <a th:href="@{/}" class="header-logo"><span>🏨</span> Hotel Booking</a>
            <nav></nav>
            <div class="header-auth">
                <span>Đã có tài khoản?</span>
                <a th:href="@{/login}" class="btn-white">Đăng nhập</a>
            </div>
        </div>
    </header>

    <!-- ===== MAIN ===== -->
    <main>
        <div class="register-wrap">
            <div class="register-card">
                <div class="register-card-inner">

                    <div class="register-eyebrow">Tạo tài khoản</div>
                    <h2 class="register-title">Create your<br><em>account</em></h2>
                    <p class="register-subtitle">Đăng ký để bắt đầu đặt phòng</p>

                    <!-- Alerts -->
                    <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>
                    <div th:if="${error}"   class="alert alert-error">✕ <span th:text="${error}"></span></div>

                    <!-- Form -->
                    <form th:action="@{/register}" th:object="${registerRequest}" method="post">

                        <!-- User ID -->
                        <div class="form-group">
                            <label for="userId">User ID</label>
                            <div class="input-wrap">
                                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8L2 7"/>
                                </svg>
                                <input type="text" id="userId" th:field="*{userId}"
                                       placeholder="Tối thiểu 3 ký tự" required autofocus>
                            </div>
                            <span class="error" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></span>
                        </div>

                        <!-- Full Name -->
                        <div class="form-group">
                            <label for="username">Full Name</label>
                            <div class="input-wrap">
                                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                                <input type="text" id="username" th:field="*{username}"
                                       placeholder="Họ và tên đầy đủ" required>
                            </div>
                            <span class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
                        </div>

                        <!-- Password -->
                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-wrap">
                                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                <input type="password" id="password" th:field="*{password}"
                                       placeholder="Tối thiểu 4 ký tự" required>
                                <button type="button" class="btn-eye" id="togglePassword" tabindex="-1">
                                    <svg id="eyeIcon1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                            <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                        </div>

                        <!-- Confirm Password -->
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <div class="input-wrap">
                                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                                </svg>
                                <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                                       placeholder="Nhập lại mật khẩu" required>
                                <button type="button" class="btn-eye" id="toggleConfirm" tabindex="-1">
                                    <svg id="eyeIcon2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                            <span class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-submit">Create Account →</button>
                        </div>
                    </form>

                    <div class="divider"></div>

                    <p class="register-footer">
                        Already have an account? <a th:href="@{/login}">Login here</a>
                    </p>

                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Hotel Booking System — All rights reserved.</p>
    </footer>
</div>

<script>
    function togglePw(btnId, inputId, iconId) {
        const btn = document.getElementById(btnId);
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (!btn) return;
        btn.addEventListener('click', () => {
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            icon.innerHTML = show
                ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
                : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        });
    }
    togglePw('togglePassword', 'password', 'eyeIcon1');
    togglePw('toggleConfirm', 'confirmPassword', 'eyeIcon2');
</script>
</body>
</html>
