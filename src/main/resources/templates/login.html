<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hotel Booking System</title>
    <link rel="stylesheet" th:href="@{/css/hotel-booking.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏨 Hotel Booking System</h1>
            <p class="subtitle">Please login to continue</p>
        </header>
        
        <main>
            <div class="form-container">
                <h2>Login</h2>
                
                <div th:if="${success}" class="alert alert-success">
                    <span th:text="${success}"></span>
                </div>
                
                <div th:if="${error}" class="alert alert-error">
                    <span th:text="${error}"></span>
                </div>
                
                <form th:action="@{/login}" th:object="${loginRequest}" method="post">
                    <input type="hidden" name="returnUrl" th:value="${returnUrl}">
                    
                    <div class="form-group">
                        <label for="userId">User ID:</label>
                        <input type="text" id="userId" th:field="*{userId}" 
                               placeholder="Enter your user ID" required autofocus>
                        <span class="error" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" th:field="*{password}" 
                               placeholder="Enter your password" required>
                        <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">🔐 Login</button>
                    </div>
                </form>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 Hotel Booking System</p>
        </footer>
    </div>
</body>
</html>
