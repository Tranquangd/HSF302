<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Rooms - Hotel Booking</title>
    <link rel="stylesheet" th:href="@{/css/hotel-booking.css}">
    <style>
        /* Taskbar styling */
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            width: 100%; /* Ensure taskbar spans the full width */
        }

        .header-content .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
        }

        .header-content .logo .logo-icon {
            font-size: 1.5rem;
            margin-right: 10px;
        }

        .header-content nav {
            display: flex;
            flex-wrap: wrap; /* Ensure links adjust for smaller screens */
        }

        .header-content nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            transition: color 0.3s;
        }

        .header-content nav a:hover {
            color: #ffcc00;
        }

        /* Ensure the page stretches to fit the window */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%; /* Ensure container spans the full width */
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <a th:href="@{/}" class="logo">
                    <span class="logo-icon">🏨</span>
                    <span class="logo-text">
                        <span class="logo-title">Hotel Booking</span>
                        <span class="logo-subtitle">Smart Reservation System</span>
                    </span>
                </a>

                <nav>
                    <a th:href="@{/}">Home</a>
                    <a th:href="@{/bookings/search}">Search Rooms</a>
                    <span th:if="${session.user}" style="margin: 0 15px; color: #fff;">
                        👤 <strong th:text="${session.username}"></strong>
                        <span class="badge" th:classappend="${session.role == 'admin' ? 'badge-error' : (session.role == 'manager' ? 'badge-warning' : 'badge-success')}" 
                              th:text="${session.role}" style="margin-left: 5px;"></span>
                    </span>
                    <a th:if="${session.user}" th:href="@{/logout}">Logout</a>
                    <a th:unless="${session.user}" th:href="@{/login}">Login</a>
                </nav>
            </div>
        </header>
        
        <main>
            <div class="form-container">
                <h2>Search Available Rooms</h2>
                
                <div th:if="${error}" class="alert alert-error">
                    <span th:text="${error}"></span>
                </div>
                
                <form th:action="@{/bookings/search}" th:object="${searchRequest}" method="post">
                    <div class="form-group">
                        <label for="checkInDate">Check-in Date:</label>
                        <input type="date" id="checkInDate" th:field="*{checkInDate}" required>
                        <span class="error" th:if="${#fields.hasErrors('checkInDate')}" th:errors="*{checkInDate}"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="checkOutDate">Check-out Date:</label>
                        <input type="date" id="checkOutDate" th:field="*{checkOutDate}" required>
                        <span class="error" th:if="${#fields.hasErrors('checkOutDate')}" th:errors="*{checkOutDate}"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="numberOfGuests">Number of Guests:</label>
                        <input type="number" id="numberOfGuests" th:field="*{numberOfGuests}" min="1" max="10" required>
                        <span class="error" th:if="${#fields.hasErrors('numberOfGuests')}" th:errors="*{numberOfGuests}"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="roomType">Room Type (Optional):</label>
                        <select id="roomType" th:field="*{roomType}">
                            <option value="">All Types</option>
                            <option value="Single">Single</option>
                            <option value="Double">Double</option>
                            <option value="Suite">Suite</option>
                            <option value="Family">Family</option>
                        </select>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">🔍 Search Rooms</button>
                        <a th:href="@{/}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 Hotel Booking System</p>
        </footer>
    </div>
</body>
</html>
