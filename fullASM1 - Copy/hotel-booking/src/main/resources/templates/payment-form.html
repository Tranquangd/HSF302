<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Hotel Booking</title>
    <link rel="stylesheet" th:href="@{/css/hotel-booking.css}">
    <style>
        /* Taskbar styling */
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            width: 100%; /* Ensure taskbar spans the full width */
        }

        .header-content .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
        }

        .header-content .logo .logo-icon {
            font-size: 1.5rem;
            margin-right: 10px;
        }

        .header-content nav {
            display: flex;
            flex-wrap: wrap; /* Ensure links adjust for smaller screens */
        }

        .header-content nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            transition: color 0.3s;
        }

        .header-content nav a:hover {
            color: #ffcc00;
        }

        /* Ensure the page stretches to fit the window */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%; /* Ensure container spans the full width */
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <a th:href="@{/}" class="logo">
                    <span class="logo-icon">🏨</span>
                    <span class="logo-text">
                        <span class="logo-title">Hotel Booking</span>
                        <span class="logo-subtitle">Smart Reservation System</span>
                    </span>
                </a>

                <nav>
                    <a th:href="@{/}">Home</a>
                    <a th:href="@{/bookings/search}">Search Rooms</a>
                    <span th:if="${session.user}" style="margin: 0 15px; color: #fff;">
                        👤 <strong th:text="${session.username}"></strong>
                        <span class="badge" th:classappend="${session.role == 'admin' ? 'badge-error' : (session.role == 'manager' ? 'badge-warning' : 'badge-success')}" 
                              th:text="${session.role}" style="margin-left: 5px;"></span>
                    </span>
                    <a th:if="${session.user}" th:href="@{/logout}">Logout</a>
                    <a th:unless="${session.user}" th:href="@{/login}">Login</a>
                </nav>
            </div>
        </header>
        
        <main>
            <div class="form-container">
                <h2>Payment Information</h2>
                
                <div th:if="${error}" class="alert alert-error">
                    <span th:text="${error}"></span>
                </div>
                
                <div class="alert alert-info">
                    <p><strong>Test Payment:</strong></p>
                    <p>✅ Card starting with "4" → Success</p>
                    <p>🎲 Other cards → Random (80% success rate)</p>
                </div>
                
                <form th:action="@{/payments/process}" th:object="${paymentRequest}" method="post">
                    <input type="hidden" th:field="*{bookingId}">
                    
                    <div class="form-group">
                        <label for="paymentMethod">Payment Method:</label>
                        <select id="paymentMethod" th:field="*{paymentMethod}" required>
                            <option value="">Select Payment Method</option>
                            <option value="CREDIT_CARD">Credit Card</option>
                            <option value="DEBIT_CARD">Debit Card</option>
                            <option value="BANK_TRANSFER">Bank Transfer</option>
                            <option value="E_WALLET">E-Wallet</option>
                            <option value="CASH">Cash</option>
                        </select>
                        <span class="error" th:if="${#fields.hasErrors('paymentMethod')}" th:errors="*{paymentMethod}"></span>
                    </div>
                    
                    <div id="cardFields">
                        <div class="form-group">
                            <label for="cardNumber">Card Number:</label>
                            <input type="text" id="cardNumber" th:field="*{cardNumber}" 
                                   placeholder="4111111111111111" maxlength="16">
                        </div>
                        
                        <div class="form-group">
                            <label for="cardHolderName">Card Holder Name:</label>
                            <input type="text" id="cardHolderName" th:field="*{cardHolderName}" 
                                   placeholder="John Doe">
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="expiryDate">Expiry Date:</label>
                                <input type="text" id="expiryDate" th:field="*{expiryDate}" 
                                       placeholder="MM/YY" maxlength="5">
                            </div>
                            
                            <div class="form-group">
                                <label for="cvv">CVV:</label>
                                <input type="text" id="cvv" th:field="*{cvv}" 
                                       placeholder="123" maxlength="3">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">💳 Process Payment</button>
                        <a th:href="@{/bookings/{id}(id=${bookingId})}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 Hotel Booking System</p>
        </footer>
    </div>
</body>
</html>
