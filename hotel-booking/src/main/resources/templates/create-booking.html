<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Booking - Hotel Booking</title>
    <link rel="stylesheet" th:href="@{/css/hotel-booking.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏨 Hotel Booking System</h1>
            <nav>
                <a th:href="@{/}">Home</a>
                <a th:href="@{/bookings/search}">Search Rooms</a>
            </nav>
        </header>
        
        <main>
            <div class="form-container">
                <h2>Complete Your Booking</h2>
                
                <div th:if="${error}" class="alert alert-error">
                    <span th:text="${error}"></span>
                </div>
                
                <div class="booking-summary">
                    <h3>Booking Details</h3>
                    <p><strong>Check-in:</strong> <span th:text="${bookingRequest.checkInDate}"></span></p>
                    <p><strong>Check-out:</strong> <span th:text="${bookingRequest.checkOutDate}"></span></p>
                    <p><strong>Guests:</strong> <span th:text="${bookingRequest.numberOfGuests}"></span></p>
                </div>
                
                <form th:action="@{/bookings/create}" th:object="${bookingRequest}" method="post">
                    <input type="hidden" th:field="*{roomId}">
                    <input type="hidden" th:field="*{checkInDate}">
                    <input type="hidden" th:field="*{checkOutDate}">
                    <input type="hidden" th:field="*{numberOfGuests}">
                    
                    <h3>Customer Information</h3>
                    
                    <div class="form-group">
                        <label for="fullName">Full Name:</label>
                        <input type="text" id="fullName" th:field="*{customerInfo.fullName}" required>
                        <span class="error" th:if="${#fields.hasErrors('customerInfo.fullName')}" th:errors="*{customerInfo.fullName}"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" th:field="*{customerInfo.email}" required>
                        <span class="error" th:if="${#fields.hasErrors('customerInfo.email')}" th:errors="*{customerInfo.email}"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number:</label>
                        <input type="tel" id="phoneNumber" th:field="*{customerInfo.phoneNumber}" 
                               pattern="[0-9]{10,15}" placeholder="1234567890" required>
                        <span class="error" th:if="${#fields.hasErrors('customerInfo.phoneNumber')}" th:errors="*{customerInfo.phoneNumber}"></span>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">✅ Create Booking</button>
                        <a th:href="@{/bookings/search}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 Hotel Booking System</p>
        </footer>
    </div>
</body>
</html>
