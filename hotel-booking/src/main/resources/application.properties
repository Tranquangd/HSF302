spring.application.name=hotel-booking

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=HotelManager;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

server.port=8080

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.mvc.format.date=yyyy-MM-dd

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
# Secret key (Base64 encoded) - In production, use environment variable
jwt.secret=dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yaG90ZWxib29raW5nYXBwbGljYXRpb25qd3R0b2tlbg==
# Access token expiration: 1 hour (in milliseconds)
jwt.expiration=3600000
# Refresh token expiration: 7 days (in milliseconds)
jwt.refresh-expiration=604800000
