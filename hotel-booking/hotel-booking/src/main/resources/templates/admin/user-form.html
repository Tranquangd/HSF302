<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User - Hotel Booking</title>
    <link rel="stylesheet" th:href="@{/css/hotel-booking.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar using fragment -->
        <aside th:replace="~{admin/fragments/sidebar :: sidebar('users')}"></aside>

        <!-- Main Content - Only Admin can manage users -->
        <main class="main-content" th:if="${session.role != null and session.role.equalsIgnoreCase('admin')}">
            <div class="page-header">
                <h1>➕ Create User Account</h1>
                <a href="/admin/users" class="btn btn-secondary">← Back</a>
            </div>

            <div th:if="${error}" class="alert alert-error"><span th:text="${error}"></span></div>

            <div class="form-card">
                <form action="/admin/users/create" method="post">
                    <div class="form-group">
                        <label for="userId">User ID *</label>
                        <input type="text" id="userId" name="userId" required placeholder="e.g., manager1">
                    </div>
                    <div class="form-group">
                        <label for="username">Full Name *</label>
                        <input type="text" id="username" name="username" required placeholder="e.g., John Manager">
                    </div>
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <input type="password" id="password" name="password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password *</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="role">Role *</label>
                        <select id="role" name="role" required>
                            <option value="manager">Manager</option>
                            <option value="staff">Staff</option>
                            <option value="customer">Customer</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Create User</button>
                        <a href="/admin/users" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>

        <!-- Show access denied message for non-Admin roles -->
        <main class="main-content" th:if="${session.role == null or !session.role.equalsIgnoreCase('admin')}">
            <div class="page-header">
                <h1>🚫 Access Denied</h1>
            </div>
            <div class="alert alert-error">
                <p>You do not have permission to manage users.</p>
                <p>Only <strong>Admin</strong> can perform this action.</p>
            </div>
            <a href="/admin/dashboard" class="btn btn-secondary">← Back to Dashboard</a>
        </main>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            var pwd = document.getElementById('password').value;
            var confirm = document.getElementById('confirmPassword').value;
            if (pwd !== confirm) {
                e.preventDefault();
                alert('Passwords do not match!');
            }
        });
    </script>
</body>
</html>
